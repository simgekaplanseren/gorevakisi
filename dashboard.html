<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Görev Akışı - Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app"></div>
  <div id="toast" hidden></div>
  <script src="app.js"></script>
  <script>
    const user = guard(true);
    if (!user) throw new Error('Yetkisiz');

    const projects = load(KEYS.projects);
    const tasks = load(KEYS.tasks);
    const users = load(KEYS.users);
    const teamUsers = users.filter((u) => u.role === 'User');

    const stats = [
      ['Ekip Üyesi', teamUsers.length],
      ['Toplam Proje', projects.length],
      ['Toplam Görev', tasks.length],
      ['Tamamlanan', tasks.filter((t) => t.status === 'Completed').length],
      ['Geciken', tasks.filter((t) => isOverdue(t)).length],
      ['Bugün Teslim', tasks.filter((t) => isDueToday(t)).length],
    ];

    const recent = [...tasks].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)).slice(0, 5);
    const pmap = Object.fromEntries(projects.map((p) => [p.id, p.name]));
    const overdue = tasks.filter((t) => isOverdue(t));
    const dueToday = tasks.filter((t) => isDueToday(t));

    const hasMember = projects.some((p) => (p.members || []).length > 0);

    document.getElementById('app').innerHTML = shell('dashboard', `
      <h1>Dashboard — Proje Lideri Paneli</h1>
      <p class="text-muted" style="margin-bottom:18px">Sen Admin'sin: ekip hesaplarını, projeleri ve görevleri buradan yönetirsin.</p>

      <div class="guide">
        <h2>Hızlı başlangıç</h2>
        <div class="steps">
          <div class="step ${teamUsers.length ? 'done' : ''}">
            <span class="step-num">${teamUsers.length ? '✓' : '1'}</span>
            <div><strong>Ekip hesapları</strong><br><a href="users.html">Kullanıcılar → hesap oluştur</a></div>
          </div>
          <div class="step ${projects.length ? 'done' : ''}">
            <span class="step-num">${projects.length ? '✓' : '2'}</span>
            <div><strong>Proje aç</strong><br><a href="projects.html">Projeler → + Proje</a></div>
          </div>
          <div class="step ${hasMember ? 'done' : ''}">
            <span class="step-num">${hasMember ? '✓' : '3'}</span>
            <div><strong>Ekibe üye ekle</strong><br><a href="projects.html">Proje Detayı → + Üye Ekle</a></div>
          </div>
          <div class="step ${tasks.length ? 'done' : ''}">
            <span class="step-num">${tasks.length ? '✓' : '4'}</span>
            <div><strong>Görev ata</strong><br><a href="projects.html">Görevler → + Görev</a></div>
          </div>
        </div>
      </div>

      <div class="grid-stats">${stats.map(([l, v]) => `<div class="box"><h3>${l}</h3><strong>${v}</strong></div>`).join('')}</div>

      ${overdue.length ? `
        <div class="today-box" style="border-color:#fecaca;background:#fff5f5">
          <h2 style="color:#b91c1c">⚠ Geciken Görevler (${overdue.length})</h2>
          ${overdue.map((t) => `<div class="today-item"><span>${t.title} — ${pmap[t.projectId]} · ${userName(t.assigneeId)}</span><a href="tasks.html?p=${t.projectId}">Git →</a></div>`).join('')}
        </div>` : ''}

      ${dueToday.length ? `
        <div class="today-box">
          <h2>📅 Bugün Teslim (${dueToday.length})</h2>
          ${dueToday.map((t) => `<div class="today-item"><span>${t.title} — ${pmap[t.projectId]} · ${userName(t.assigneeId)}</span><a href="tasks.html?p=${t.projectId}">Git →</a></div>`).join('')}
        </div>` : ''}

      <h2>Projeler</h2>
      ${projects.length ? `
        <table style="margin-bottom:24px">
          <thead><tr><th>Proje</th><th>Lider</th><th>Ekip</th><th>İlerleme</th><th></th></tr></thead>
          <tbody>
            ${projects.map((p) => {
              const s = projectStats(p.id);
              return `<tr>
                <td><strong>${p.name}</strong></td>
                <td>${userName(p.ownerId)}</td>
                <td>${projectTeam(p).length} kişi</td>
                <td>${s.done}/${s.total} (%${s.percent})</td>
                <td><a href="project.html?id=${p.id}">Yönet →</a></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>` : '<p class="text-muted" style="margin-bottom:24px">Henüz proje yok. <a href="projects.html">Proje oluştur</a></p>'}

      <h2>Son Görevler</h2>
      <table>
        <thead><tr><th>Başlık</th><th>Proje</th><th>Atanan</th><th>Durum</th><th>Teslim</th></tr></thead>
        <tbody>
          ${recent.length ? recent.map((t) => `
            <tr>
              <td>${t.title}</td>
              <td>${pmap[t.projectId] || '—'}</td>
              <td>${userName(t.assigneeId)}</td>
              <td><span class="tag ${badge(t.status)}">${statusLabel(t.status)}</span></td>
              <td class="${dueClass(t)}">${fmtDate(t.dueDate)}</td>
            </tr>`).join('') : '<tr><td colspan="5">Görev yok</td></tr>'}
        </tbody>
      </table>
    `);
  </script>
</body>
</html>
