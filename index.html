<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow - Giriş</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth">
    <div class="card">
      <div class="logo">
        <h1>TaskFlow</h1>
        <p>Görev Yönetim Sistemi</p>
      </div>

      <div id="msg"></div>

      <form id="form">
        <div class="field">
          <label>E-posta</label>
          <input type="email" id="email" required placeholder="admin@taskflow.com">
        </div>
        <div class="field">
          <label>Şifre</label>
          <input type="password" id="password" required placeholder="Admin123!">
        </div>
        <button class="btn btn-main" type="submit">Giriş Yap</button>
      </form>

      <p class="center"><a href="register.html">Kayıt ol</a> · <a href="forgot.html">Şifremi unuttum</a></p>

      <div class="hint">
        <strong>Nasıl açılır?</strong><br>
        Bu dosyaya (<code>index.html</code>) çift tıkla — İPSİA HOME gibi.<br><br>
        Admin: admin@taskflow.com / Admin123!<br>
        Kullanıcı: user@taskflow.com / User123!
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    const user = me();
    if (user) location.href = user.role === 'Admin' ? 'dashboard.html' : 'projects.html';

    document.getElementById('form').addEventListener('submit', (e) => {
      e.preventDefault();
      try {
        const u = login(document.getElementById('email').value, document.getElementById('password').value);
        location.href = u.role === 'Admin' ? 'dashboard.html' : 'projects.html';
      } catch (err) {
        document.getElementById('msg').innerHTML = `<div class="msg err">${err.message}</div>`;
      }
    });
  </script>
</body>
</html>
