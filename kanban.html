<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow - Kanban</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app"></div>
  <script src="app.js"></script>
  <script>
    const user = guard();
    const pid = new URLSearchParams(location.search).get('p');
    const project = load(KEYS.projects).find(p => p.id === pid);
    if (!project) location.href = 'projects.html';

    let dragId = null;

    function render() {
      const tasks = tasksFor(user, pid);
      document.getElementById('app').innerHTML = shell('projects', `
        <div class="row">
          <div>
            <a href="projects.html">← Projeler</a>
            <h1 style="margin-top:6px">${project.name} · Kanban</h1>
          </div>
          <a class="btn btn-light" href="tasks.html?p=${pid}">Görev Listesi</a>
        </div>
        <p style="color:#64748b;margin-bottom:14px">Kartları sürükleyerek durum değiştir.</p>
        <div class="kanban" id="board"></div>
      `);

      const board = document.getElementById('board');
      board.innerHTML = STATUSES.map(col => {
        const items = tasks.filter(t => t.status === col.id);
        return `
          <div class="col" data-status="${col.id}">
            <h4>${col.label}<span>${items.length}</span></h4>
            ${items.map(t => `
              <div class="task-card" draggable="true" data-id="${t.id}">
                <h5>${t.title}</h5>
                <small>${userName(t.assigneeId)} · ${fmtDate(t.dueDate)}</small><br>
                <span class="tag ${pbadge(t.priority)}">${priorityLabel(t.priority)}</span>
              </div>`).join('')}
          </div>`;
      }).join('');

      board.querySelectorAll('.task-card').forEach(card => {
        card.addEventListener('dragstart', () => { dragId = card.dataset.id; });
        card.addEventListener('dragend', () => { dragId = null; });
      });

      board.querySelectorAll('.col').forEach(col => {
        col.addEventListener('dragover', (e) => { e.preventDefault(); col.classList.add('over'); });
        col.addEventListener('dragleave', () => col.classList.remove('over'));
        col.addEventListener('drop', () => {
          col.classList.remove('over');
          if (!dragId) return;
          const tasks = load(KEYS.tasks);
          const t = tasks.find(x => x.id === dragId);
          if (t && (user.role === 'Admin' || t.assigneeId === user.id)) {
            t.status = col.dataset.status;
            save(KEYS.tasks, tasks);
            render();
          }
        });
      });
    }

    render();
  </script>
</body>
</html>
