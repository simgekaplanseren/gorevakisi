<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Görev Akışı - Lider Paneli</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app"></div>
  <div id="toast" hidden></div>

  <dialog id="projectDlg" style="border:0;border-radius:14px;padding:20px;max-width:420px;width:92%">
    <h2 style="margin-bottom:12px">Yeni Proje</h2>
    <div class="field"><label>Proje Adı</label><input id="pName"></div>
    <div class="field"><label>Açıklama</label><textarea id="pDesc" rows="3"></textarea></div>
    <div class="actions">
      <button class="btn btn-light" onclick="projectDlg.close()">İptal</button>
      <button class="btn btn-main" style="width:auto" onclick="addProject()">Oluştur</button>
    </div>
  </dialog>

  <dialog id="userDlg" style="border:0;border-radius:14px;padding:20px;max-width:440px;width:92%">
    <h2 style="margin-bottom:12px">Yeni Kullanıcı</h2>
    <div class="field"><label>Ad</label><input id="uName"></div>
    <div class="field"><label>Soyad</label><input id="uSurname"></div>
    <div class="field"><label>E-posta</label><input type="email" id="uEmail"></div>
    <div class="field"><label>Şifre</label><input type="password" id="uPassword"></div>
    <div class="actions">
      <button class="btn btn-light" onclick="userDlg.close()">İptal</button>
      <button class="btn btn-main" style="width:auto" onclick="addTeammate()">Kaydet</button>
    </div>
  </dialog>

  <script src="app.js"></script>
  <script>
    const user = guard();
    const projectDlg = document.getElementById('projectDlg');
    const userDlg = document.getElementById('userDlg');

    function render() {
      const led = projectsLedBy(user);
      const allUsers = load(KEYS.users).filter((u) => u.id !== user.id && u.role === 'User');
      const ledTasks = load(KEYS.tasks).filter((t) => led.some((p) => p.id === t.projectId));
      const overdue = ledTasks.filter((t) => isOverdue(t));

      document.getElementById('app').innerHTML = shell('leader', `
        <div class="row">
          <h1 style="margin:0">Lider Paneli</h1>
          <div class="actions">
            <button class="btn btn-light" onclick="openUser()">+ Kullanıcı</button>
            <button class="btn btn-main" style="width:auto" onclick="openProject()">+ Proje</button>
          </div>
        </div>

        ${overdue.length ? `
          <div class="today-box" style="border-color:#fecaca;background:#fff5f5;margin:16px 0">
            <h2 style="color:#b91c1c;font-size:15px">Geciken görev (${overdue.length})</h2>
            ${overdue.slice(0, 3).map((t) => {
              const p = led.find((x) => x.id === t.projectId);
              return `<div class="today-item"><span>${t.title} (${p?.name})</span><a href="tasks.html?p=${t.projectId}">Git →</a></div>`;
            }).join('')}
          </div>` : ''}

        <h2>Projelerim</h2>
        ${!led.length ? '<p class="text-muted">Proje yok.</p>' : `
          <div class="grid" style="margin-top:12px">
            ${led.map((p) => {
              const s = projectStats(p.id);
              const team = projectTeam(p);
              return `
                <div class="box project">
                  <h3>${p.name}</h3>
                  <p>${p.description || ''}</p>
                  <small>Ekip: ${team.map((u) => u.name).join(', ')}</small>
                  <div class="bar"><i style="width:${s.percent}%"></i></div>
                  <small>${s.done}/${s.total} görev · %${s.percent}</small>
                  <div class="actions">
                    <a class="btn btn-main" style="width:auto" href="project.html?id=${p.id}">Detay</a>
                    <a class="btn btn-light" href="tasks.html?p=${p.id}&new=1">+ Görev</a>
                    <a class="btn btn-light" href="kanban.html?p=${p.id}">Kanban</a>
                  </div>
                </div>`;
            }).join('')}
          </div>`}

        <h2 style="margin-top:28px">Kullanıcılar</h2>
        ${allUsers.length ? `
          <table>
            <thead><tr><th>Ad Soyad</th><th>E-posta</th><th>Projeler</th><th></th></tr></thead>
            <tbody>
              ${allUsers.map((u) => {
                const ps = projectsForUserId(u.id).map((p) => p.name).join(', ') || '—';
                return `<tr>
                  <td>${u.name} ${u.surname}</td>
                  <td>${u.email}</td>
                  <td>${ps}</td>
                  <td>${led.length ? `<a href="project.html?id=${led[0].id}">Ekle</a>` : '—'}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>` : '<p class="text-muted">Kullanıcı yok.</p>'}
      `);
    }

    function openProject() {
      document.getElementById('pName').value = '';
      document.getElementById('pDesc').value = '';
      projectDlg.showModal();
    }

    function addProject() {
      const name = document.getElementById('pName').value.trim();
      if (!name) return toast('Proje adı gerekli', false);
      const projects = load(KEYS.projects);
      const newId = id();
      projects.push({
        id: newId,
        name,
        description: document.getElementById('pDesc').value.trim(),
        ownerId: user.id,
        members: [],
        updatedAt: new Date().toISOString(),
      });
      save(KEYS.projects, projects);
      projectDlg.close();
      location.href = `project.html?id=${newId}`;
    }

    function openUser() {
      document.getElementById('uName').value = '';
      document.getElementById('uSurname').value = '';
      document.getElementById('uEmail').value = '';
      document.getElementById('uPassword').value = '';
      userDlg.showModal();
    }

    function addTeammate() {
      try {
        createTeamUser(
          document.getElementById('uName').value,
          document.getElementById('uSurname').value,
          document.getElementById('uEmail').value,
          document.getElementById('uPassword').value
        );
        userDlg.close();
        render();
        toast('Kullanıcı eklendi', true);
      } catch (err) {
        toast(err.message, false);
      }
    }

    render();
  </script>
</body>
</html>
