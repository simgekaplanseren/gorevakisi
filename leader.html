<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Görev Akışı - Lider Paneli</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app"></div>
  <div id="toast" hidden></div>

  <dialog id="projectDlg" style="border:0;border-radius:14px;padding:20px;max-width:420px;width:92%">
    <h2 style="margin-bottom:12px">Yeni Proje — Sen Lider Ol</h2>
    <p class="text-muted" style="margin-bottom:12px">Proje oluşturduğunda otomatik olarak lideri sen olursun.</p>
    <div class="field"><label>Proje Adı</label><input id="pName" placeholder="Örn: Staj Projesi, Bitirme Ödevi"></div>
    <div class="field"><label>Açıklama</label><textarea id="pDesc" rows="3" placeholder="Projenin amacı..."></textarea></div>
    <div class="actions">
      <button class="btn btn-light" onclick="projectDlg.close()">İptal</button>
      <button class="btn btn-main" style="width:auto" onclick="addProject()">Proje Oluştur</button>
    </div>
  </dialog>

  <dialog id="userDlg" style="border:0;border-radius:14px;padding:20px;max-width:440px;width:92%">
    <h2 style="margin-bottom:12px">Ekip Arkadaşı Hesabı Aç</h2>
    <p class="text-muted" style="margin-bottom:12px">Arkadaşına e-posta ve şifre ver. Sonra projene ekle.</p>
    <div class="field"><label>Ad</label><input id="uName"></div>
    <div class="field"><label>Soyad</label><input id="uSurname"></div>
    <div class="field"><label>E-posta</label><input type="email" id="uEmail"></div>
    <div class="field"><label>Şifre</label><input type="password" id="uPassword" placeholder="En az 6 karakter"></div>
    <div class="actions">
      <button class="btn btn-light" onclick="userDlg.close()">İptal</button>
      <button class="btn btn-main" style="width:auto" onclick="addTeammate()">Hesap Oluştur</button>
    </div>
  </dialog>

  <script src="app.js"></script>
  <script>
    const user = guard();
    const projectDlg = document.getElementById('projectDlg');
    const userDlg = document.getElementById('userDlg');

    function render() {
      const led = projectsLedBy(user);
      const allUsers = load(KEYS.users).filter((u) => u.id !== user.id && u.role === 'User');
      const hasTeammate = allUsers.length > 0;
      const hasMember = led.some((p) => (p.members || []).length > 0);
      const ledTasks = load(KEYS.tasks).filter((t) => led.some((p) => p.id === t.projectId));
      const overdue = ledTasks.filter((t) => isOverdue(t));

      const step = (done, num, text, action) => `
        <div class="step ${done ? 'done' : ''}">
          <span class="step-num">${done ? '✓' : num}</span>
          <div>${text}${action || ''}</div>
        </div>`;

      document.getElementById('app').innerHTML = shell('leader', `
        <div class="leader-hero">
          <h1>★ Lider Paneli</h1>
          <p>Burada <strong>${user.name}</strong> olarak kendi projeni kurar, ekibini yönetir ve görev dağıtırsın.</p>
        </div>

        <div class="guide">
          <h2>Lider olarak 4 adım</h2>
          <div class="steps">
            ${step(led.length > 0, 1, '<strong>Proje oluştur</strong> — sen otomatik lider olursun', led.length ? '' : '<br><button class="btn btn-main" style="width:auto;margin-top:8px" onclick="openProject()">+ İlk Projemi Oluştur</button>')}
            ${step(hasTeammate, 2, '<strong>Ekip hesabı aç</strong> — arkadaşın için kullanıcı oluştur', hasTeammate ? '' : '<br><button class="btn btn-light" style="margin-top:8px" onclick="openUser()">+ Ekip Hesabı Aç</button>')}
            ${step(hasMember, 3, '<strong>Projeye üye ekle</strong> — Proje Detayı → + Üye Ekle', led.length ? `<br><a href="project.html?id=${led[0].id}">Proje detayına git →</a>` : '')}
            ${step(ledTasks.length > 0, 4, '<strong>Görev oluştur ve ata</strong>', led.length ? `<br><a href="tasks.html?p=${led[0].id}&new=1">Görev oluştur →</a>` : '')}
          </div>
        </div>

        <div class="row">
          <h2 style="margin:0">Lider Olduğun Projeler (${led.length})</h2>
          <div class="actions">
            <button class="btn btn-light" onclick="openUser()">+ Ekip Hesabı</button>
            <button class="btn btn-main" style="width:auto" onclick="openProject()">+ Yeni Proje</button>
          </div>
        </div>

        ${overdue.length ? `
          <div class="today-box" style="border-color:#fecaca;background:#fff5f5;margin:16px 0">
            <h2 style="color:#b91c1c;font-size:15px">⚠ Projelerinde geciken görev: ${overdue.length}</h2>
            ${overdue.slice(0, 3).map((t) => {
              const p = led.find((x) => x.id === t.projectId);
              return `<div class="today-item"><span>${t.title} (${p?.name})</span><a href="tasks.html?p=${t.projectId}">Git →</a></div>`;
            }).join('')}
          </div>` : ''}

        ${!led.length ? `
          <div class="empty-state">
            <h3>Henüz lider olduğun proje yok</h3>
            <p>İlk projeni oluştur — staj, okul ödevi veya ekip çalışması için kullanabilirsin.</p>
            <button class="btn btn-main" style="width:auto;margin-top:12px" onclick="openProject()">+ Proje Oluştur ve Lider Ol</button>
          </div>` : `
          <div class="grid" style="margin-top:16px">
            ${led.map((p) => {
              const s = projectStats(p.id);
              const team = projectTeam(p);
              return `
                <div class="box project leader-card">
                  <span class="leader-badge">Sen Lidersin</span>
                  <h3>${p.name}</h3>
                  <p>${p.description || ''}</p>
                  <small><strong>Ekip:</strong> ${team.length} kişi — ${team.map((u) => u.name).join(', ')}</small>
                  <div class="bar"><i style="width:${s.percent}%"></i></div>
                  <small>${s.done}/${s.total} görev · %${s.percent}</small>
                  <div class="actions">
                    <a class="btn btn-main" style="width:auto" href="project.html?id=${p.id}">Ekip Yönet</a>
                    <a class="btn btn-light" href="tasks.html?p=${p.id}&new=1">+ Görev</a>
                    <a class="btn btn-light" href="kanban.html?p=${p.id}">Kanban</a>
                  </div>
                </div>`;
            }).join('')}
          </div>`}

        <h2 style="margin-top:28px">Kayıtlı Ekip Üyeleri</h2>
        <p class="text-muted" style="margin-bottom:12px">Bu kişileri projenin detay sayfasından ekleyebilirsin.</p>
        ${allUsers.length ? `
          <table>
            <thead><tr><th>Ad Soyad</th><th>E-posta</th><th>Projeler</th><th></th></tr></thead>
            <tbody>
              ${allUsers.map((u) => {
                const ps = projectsForUserId(u.id).map((p) => p.name).join(', ') || 'Henüz eklenmedi';
                return `<tr>
                  <td>${u.name} ${u.surname}</td>
                  <td>${u.email}</td>
                  <td>${ps}</td>
                  <td>${led.length ? `<a href="project.html?id=${led[0].id}">Projeye ekle →</a>` : '—'}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>` : `
          <div class="empty-hint">Henüz ekip hesabı yok. <button class="btn btn-light" onclick="openUser()">+ Ekip Hesabı Aç</button></div>`}
      `);
    }

    function openProject() {
      document.getElementById('pName').value = '';
      document.getElementById('pDesc').value = '';
      projectDlg.showModal();
    }

    function addProject() {
      const name = document.getElementById('pName').value.trim();
      if (!name) return toast('Proje adı gerekli', false);
      const projects = load(KEYS.projects);
      const newId = id();
      projects.push({
        id: newId,
        name,
        description: document.getElementById('pDesc').value.trim(),
        ownerId: user.id,
        members: [],
        updatedAt: new Date().toISOString(),
      });
      save(KEYS.projects, projects);
      projectDlg.close();
      toast('Tebrikler! Artık bu projenin liderisin.', true);
      location.href = `project.html?id=${newId}`;
    }

    function openUser() {
      document.getElementById('uName').value = '';
      document.getElementById('uSurname').value = '';
      document.getElementById('uEmail').value = '';
      document.getElementById('uPassword').value = '';
      userDlg.showModal();
    }

    function addTeammate() {
      try {
        createTeamUser(
          document.getElementById('uName').value,
          document.getElementById('uSurname').value,
          document.getElementById('uEmail').value,
          document.getElementById('uPassword').value
        );
        userDlg.close();
        render();
        toast('Ekip hesabı oluşturuldu — şimdi projene ekle', true);
      } catch (err) {
        toast(err.message, false);
      }
    }

    render();
  </script>
</body>
</html>
