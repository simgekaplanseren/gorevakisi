<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Görev Akışı - Projeler</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app"></div>
  <div id="toast" hidden></div>

  <dialog id="dlg" style="border:0;border-radius:14px;padding:20px;max-width:420px;width:92%">
    <h2 style="margin-bottom:12px">Yeni Proje</h2>
    <div class="field"><label>Proje Adı</label><input id="pName"></div>
    <div class="field"><label>Açıklama</label><textarea id="pDesc" rows="3"></textarea></div>
    <div class="actions">
      <button class="btn btn-light" onclick="dlg.close()">İptal</button>
      <button class="btn btn-main" style="width:auto" onclick="addProject()">Oluştur</button>
    </div>
  </dialog>

  <script src="app.js"></script>
  <script>
    const user = guard();
    const dlg = document.getElementById('dlg');
    const isAdmin = user.role === 'Admin';

    function todayTasksHtml() {
      const mine = tasksFor(user).filter((t) => isDueToday(t) || isOverdue(t));
      if (!mine.length) return '<p class="text-muted" style="font-size:14px">Görev yok.</p>';
      return mine.map((t) => {
        const p = load(KEYS.projects).find((x) => x.id === t.projectId);
        return `<div class="today-item">
          <span>${t.title} <small>(${p?.name || 'Proje'})</small></span>
          <a href="tasks.html?p=${t.projectId}">Git →</a>
        </div>`;
      }).join('');
    }

    function render() {
      const q = (document.getElementById('search')?.value || '').toLowerCase();
      const list = projectsFor(user).filter((p) =>
        !q || p.name.toLowerCase().includes(q) || (p.description || '').toLowerCase().includes(q)
      );

      document.getElementById('app').innerHTML = shell('projects', `
        <div class="today-box">
          <h2>Bugünkü Görevler</h2>
          ${todayTasksHtml()}
        </div>
        <div class="row">
          <h1 style="margin:0">Projeler</h1>
          <div class="filters">
            <input id="search" placeholder="Ara..." value="${q.replace(/"/g, '&quot;')}" oninput="render()">
            ${isAdmin ? '<button class="btn btn-main" style="width:auto" onclick="openNew()">+ Proje</button>' : ''}
          </div>
        </div>
        ${!list.length ? '<p class="text-muted">Proje bulunamadı.</p>' : `
        <div class="grid">
          ${list.map((p) => {
            const s = projectStats(p.id);
            const team = projectTeam(p);
            const owner = userName(p.ownerId);
            return `
              <div class="box project">
                <h3>${p.name}</h3>
                <p>${p.description || ''}</p>
                <small>Lider: ${owner} · Ekip: ${team.map((u) => u.name).join(', ')}</small>
                <div class="bar"><i style="width:${s.percent}%"></i></div>
                <small>${s.done}/${s.total} görev · %${s.percent}</small>
                <div class="actions">
                  <a class="btn btn-main" style="width:auto" href="project.html?id=${p.id}">Detay</a>
                  <a class="btn btn-light" href="tasks.html?p=${p.id}">Görevler</a>
                  <a class="btn btn-light" href="kanban.html?p=${p.id}">Kanban</a>
                  ${canManageProject(user, p) ? `<button class="btn btn-danger" onclick="delProject('${p.id}')">Sil</button>` : ''}
                </div>
              </div>`;
          }).join('')}
        </div>`}
      `);
    }

    function openNew() {
      document.getElementById('pName').value = '';
      document.getElementById('pDesc').value = '';
      dlg.showModal();
    }

    function addProject() {
      const name = document.getElementById('pName').value.trim();
      if (!name) return toast('Proje adı gerekli', false);
      const projects = load(KEYS.projects);
      const newId = id();
      projects.push({
        id: newId,
        name,
        description: document.getElementById('pDesc').value.trim(),
        ownerId: user.id,
        members: [],
        updatedAt: new Date().toISOString(),
      });
      save(KEYS.projects, projects);
      dlg.close();
      location.href = `project.html?id=${newId}`;
    }

    function delProject(pid) {
      if (!confirm('Proje silinsin mi?')) return;
      save(KEYS.projects, load(KEYS.projects).filter((p) => p.id !== pid));
      save(KEYS.tasks, load(KEYS.tasks).filter((t) => t.projectId !== pid));
      render();
      toast('Proje silindi', true);
    }

    render();
  </script>
</body>
</html>
