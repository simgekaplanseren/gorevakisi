<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow - Kayıt</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth">
    <div class="card">
      <div class="logo"><h1>Kayıt Ol</h1></div>
      <div id="msg"></div>
      <form id="form">
        <div class="field"><label>Ad</label><input id="name" required></div>
        <div class="field"><label>Soyad</label><input id="surname" required></div>
        <div class="field"><label>E-posta</label><input type="email" id="email" required></div>
        <div class="field"><label>Şifre</label><input type="password" id="password" required minlength="6"></div>
        <button class="btn btn-main" type="submit">Kayıt Ol</button>
      </form>
      <p class="center"><a href="index.html">Giriş sayfasına dön</a></p>
    </div>
  </div>
  <script src="app.js"></script>
  <script>
    document.getElementById('form').addEventListener('submit', (e) => {
      e.preventDefault();
      try {
        register(
          document.getElementById('name').value,
          document.getElementById('surname').value,
          document.getElementById('email').value,
          document.getElementById('password').value
        );
        location.href = 'projects.html';
      } catch (err) {
        document.getElementById('msg').innerHTML = `<div class="msg err">${err.message}</div>`;
      }
    });
  </script>
</body>
</html>
